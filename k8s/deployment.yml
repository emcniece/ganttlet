apiVersion: apps/v1
kind: Deployment
metadata:
  name: ganttlet
  namespace: ganttlet
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: ganttlet
  template:
    metadata:
      labels:
        app: ganttlet
    spec:
      containers:
        - name: ganttlet
          image: ghcr.io/emcniece/ganttlet:latest
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: ganttlet-config
            - secretRef:
                name: ganttlet-secret
          volumeMounts:
            - name: data
              mountPath: /data
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 3
            periodSeconds: 10
          resources:
            requests:
              memory: 128Mi
              cpu: 100m
            limits:
              memory: 512Mi
              cpu: 500m
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: ganttlet-data
